<app-header />

<main class="cabinet-page">
  <div class="container-app py-7 pb-16">

    <h1 class="font-heading font-black text-ink mb-5" style="font-size:28px">
      Вітаємо, {{ greeting }}! 👋
    </h1>

    <div class="cabinet-grid">

      <!-- ─── Profile Sidebar ─────────────────────────────── -->
      <aside class="cabinet-sidebar">
        <!-- Avatar + info -->
        <div class="text-center mb-5">
          <span class="avatar-circle">{{ userInitial }}</span>
          <div class="font-heading font-extrabold text-ink mt-3" style="font-size:17px">{{ userName }}</div>
          <div class="text-sm text-ink-2 mt-0.5">{{ user()?.email }}</div>
        </div>

        <!-- Loyalty badge -->
        <div class="loyalty-badge">⭐ Срібний рівень · 1 240 балів</div>

        <!-- Nav -->
        <nav class="cabinet-nav">
          <a routerLink="/cabinet/bookings"
             class="cabinet-nav-item"
             [class.cabinet-nav-active]="activeSection === 'bookings'">
            🧳 Мої бронювання
          </a>
          <a routerLink="/cabinet/wishlist"
             class="cabinet-nav-item"
             [class.cabinet-nav-active]="activeSection === 'wishlist'">
            ♡ Wishlist
            @if (wishlistCount > 0) {
              <span class="nav-badge">{{ wishlistCount }}</span>
            }
          </a>
          <a routerLink="/cabinet/profile"
             class="cabinet-nav-item"
             [class.cabinet-nav-active]="activeSection === 'profile'">
            👤 Мій профіль
          </a>
          <button class="cabinet-nav-item cabinet-nav-logout" (click)="logout()">
            ↩ Вийти
          </button>
        </nav>
      </aside>

      <!-- ─── Main Content ────────────────────────────────── -->
      <div class="cabinet-content">
        <ng-content />
      </div>

    </div>
  </div>
</main>

<app-footer />
<app-mobile-tab-bar />
